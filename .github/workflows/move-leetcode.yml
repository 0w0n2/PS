name: Move LeetCode Solutions

on:
  workflow_dispatch:
  push:
    paths:
      - "[0-9][0-9][0-9][0-9]-*/**"
      - "README.md"

permissions:
  contents: write

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move LeetCode solutions
        run: |
          mkdir -p LeetCode

          found=0
          for d in [0-9][0-9][0-9][0-9]-*; do
            if [ -d "$d" ]; then
              echo "Moving directory: $d"
              mv "$d" "LeetCode/"
              found=1
            fi
          done

          if [ $found -eq 0 ]; then
            echo "No matching directories found"
          fi

      - name: Restore README changed by LeetHub
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git restore --source="${{ github.event.before }}" -- README.md || true
          fi

      - name: Commit & Push changes
        run: |
          if git status --porcelain | grep .; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "chore: Move LeetCode solutions to LeetCode folder"
            git push
          else
            echo "No changes to commit"
          fi
